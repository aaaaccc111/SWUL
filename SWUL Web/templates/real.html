<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.png') }}">
    <title>軟體使用紀錄</title>
    <link href="https://cdn.jsdelivr.net/npm/air-datepicker@3.3.5/air-datepicker.min.css" rel="stylesheet">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border: 1px solid #ddd;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:nth-child(odd) {
            background-color: #ffffff;
        }
        tr:hover {
            background-color: #ddd;
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .table-title {
            text-align: center;
            margin-bottom: 0px;
            background-color: #f2f2f2;
            padding: 1px 0;
            border-radius: 8px;
        }

        .search-container {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background-color: #f0f0f0;
            border-bottom: 1px solid #ddd;
        }
        .search-container input[type="text"] {
            padding: 10px;
            font-size: 1em;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .search-container select {
            padding: 10px;
            font-size: 1em;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .search-container button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px 0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .center {
            text-align: center;
            margin: 3px 0;
        }
        .versioncenter {
            text-align: center;
            margin: 3px 0;
        }
        .error {
            border: 2px solid red;
        }
        .error-message {
            color: red;
            font-size: 0.875em;
        }
        footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 20px 0;
            border-top: 1px solid #ddd;
            margin-top: 20px;
        }
        nav {
            display: flex;
            align-items: center;
            padding: 10px 10px;
            background-color: #f0f0f0;
            overflow: visible;
            position: relative;
            box-shadow: 0 10px 4px rgba(0, 0, 0, 0.1);

        }
        nav a {
            display: block;
            color: #000000;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 16px;
        }

        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #333;
            border-radius: 4px;
            padding: 10px;
            z-index: 100;
        }

        .submenu button {
            display: block;
            padding: 5px 10px;
            color: white;
            background-color: #333;
            border: none;
            box-shadow: none;
            font-size: 16px;
            cursor: pointer;
        }

        .logo {
            width: 50px;
            height: auto;
            margin-right: 10px;
        }
        .submenu-trigger {
            position: relative;
            display: inline-block;
        }

        #ordinary-search-button:hover {
            background-color: #fffefe;
            color: rgb(0, 0, 0);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        #advanced-search-button:hover {
            background-color: #fffefe;
            color: rgb(0, 0, 0);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            width: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 10px;
        }

        .card-body p {
            margin: 5px 0;
            font-size: 1em;
        }

        .card-body p strong {
            color: #333;
        }

        .modal {
            display: flex;
            justify-content: center;
            align-items: center;

            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;

            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9999;
        }

        .modal-content {
            position: relative;
            background-color: white;
            padding: 20px;
            margin: 10% auto;
            width: 20%;
            border-radius: 10px;
        }
        .close {
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }


    </style>
    <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.3.5/air-datepicker.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>

        function toggleSubmenu(event) {
            event.stopPropagation();

            var submenu = document.getElementById('submenu');
            var trigger = document.querySelector('.submenu-trigger');

            if (submenu.style.display === 'block') {
                submenu.style.display = 'none';
            } else {
                submenu.style.display = 'block';
                var rect = trigger.getBoundingClientRect();
                submenu.style.position = 'absolute';
                submenu.style.left = rect.left + window.scrollX + 'px';
                submenu.style.top = rect.bottom + window.scrollY + 'px';
            }
        }



        document.addEventListener('click', function(event) {
            var submenu = document.getElementById('submenu');
            var trigger = document.querySelector('.submenu-trigger');
            var trigger = document.querySelector('.submenu-trigger');


            if (!submenu.contains(event.target) && !trigger.contains(event.target)) {
                submenu.style.display = 'none';
            }
        });

        function hideUsageTime() {
            console.log("hideUsageTime triggered");
        }

        function showUsageTime() {
            console.log("Mouse over: showUsageTime called");
        }

        function showCardDetail(user, program, pid, start, end, duration) {
            document.getElementById('modalUser').innerText = "使用者: " + user;
            document.getElementById('modalProgram').innerText = "軟體名稱: " + program;
            document.getElementById('modalPID').innerText = "PID: " + pid;
            document.getElementById('modalStart').innerText = "開始時間: " + start;
            document.getElementById('modalEnd').innerText = "結束時間: " + end;
            document.getElementById('modalDuration').innerText = "使用時間: " + duration;

            const errorElem = document.getElementById('errorMessage');
            errorElem.innerText = "使用時間異常";
            errorElem.classList.add("error-message");

            document.getElementById('cardModal').style.display = 'block';


        }


        function closeModal() {
            document.getElementById('cardModal').style.display = 'none';
        }
    </script>
</head>
<body>
    <nav>
        <div class="logo-container">
            <a href="/">
            </a>
            <span class="title"></span>
        </div>
        <a href="/real_time">即時資料</a>
        <div class="submenu-container">
            <a href="javascript:void(0);" class="submenu-trigger" onclick="toggleSubmenu(event)">查詢</a>
            <div class="submenu" id="submenu">
                <button id="ordinary-search-button">一般查詢</button>
                <button id="advanced-search-button">進階查詢</button>
            </div>
        </div>
        <a href="/graph">圖表</a>

    </nav>
    <br>
    <br>
    <div class="card-container">
        {% for row in data %}
        <div class="card" {% if row[5] in highlight_yellow %} style="background-color: rgb(255, 238, 0); cursor: pointer;" onclick="showCardDetail(`{{ row[0] }}`, `{{ row[1] }}`, `{{ row[2] }}`, `{{ row[3] }}`, `{{ row[4] }}`, `{{ row[5] }}`)" {% endif %}>
            <div class="card-header">
                <h4>{{ row[0] }}</h4>
            </div>
            <div class="card-body">
                <p><strong>軟體名稱:<br></strong> {{ row[1] }}</p>
                <p><strong>PID:<br></strong> {{ row[2] }}</p>
                <p><strong>開始時間:<br></strong> {{ row[3] }}</p>
                <p>
                    <strong>結束時間:<br></strong>
                    <span
                        {% if row[4] in latest_end_times %}
                            style="color: red;"
                        {% else %}
                            style="color: black;"
                        {% endif %}
                    >{{ row[4] }}</span>
                </p>
                <p><strong>使用時間:<br></strong> {{ row[5] }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
    <div id="cardModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>異常訊息</h3>
            <p id="modalUser"></p>
            <p id="modalProgram"></p>
            <p id="modalPID"></p>
            <p id="modalStart"></p>
            <p id="modalEnd"></p>
            <p id="modalDuration"></p>
            <p id="errorMessage"></p>
        </div>
    </div>
    <script>
        document.getElementById("ordinary-search-button").addEventListener("click", function() {
            window.location.href = "/ordinary_search";
        });
        document.getElementById("advanced-search-button").addEventListener("click", function() {
            window.location.href = "/advanced_search";
        });

        const socket = io();

        socket.on('reload_page', () => {
            console.log('Received reload command from server.');
            location.reload();
        });
    </script>

</body>
</html>
